<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGame #5 – Reaction Timer</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f1f5f9;
  font-family: Arial, sans-serif;
}

.game-box {
  width: 100%;
  max-width: 520px;
  background: white;
  padding: 24px;
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

h1 {
  margin-top: 0;
}

.game-area {
  height: 200px;
  border-radius: 12px;
  margin: 20px 0;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 20px;
  cursor: pointer;
  user-select: none;
  background: #64748b;
}

.wait {
  background: #dc2626;
}

.ready {
  background: #22c55e;
}

.message {
  height: 24px;
  font-weight: bold;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  background: #0f172a;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="game-box">
  <h1>WebGame #5 - Reaction Timer</h1>

  <div id="gameArea" class="game-area">
    Click to start
  </div>

  <div id="message" class="message"></div>

  <button onclick="resetGame()">Restart</button>
</div>

<script>
const gameArea = document.getElementById("gameArea");
const message = document.getElementById("message");

let state = "idle"; // idle, waiting, ready
let startTime = 0;
let timeout;

gameArea.addEventListener("click", () => {
  if (state === "idle") {
    startWaiting();
  } else if (state === "waiting") {
    tooEarly();
  } else if (state === "ready") {
    showResult();
  }
});

function startWaiting() {
  state = "waiting";
  gameArea.textContent = "Wait for green...";
  gameArea.classList.add("wait");

  const delay = Math.random() * 3000 + 2000;

  timeout = setTimeout(() => {
    state = "ready";
    gameArea.classList.remove("wait");
    gameArea.classList.add("ready");
    gameArea.textContent = "CLICK!";
    startTime = Date.now();
  }, delay);
}

function tooEarly() {
  clearTimeout(timeout);
  state = "idle";
  gameArea.classList.remove("wait");
  gameArea.textContent = "Too early! 😅";
  message.textContent = "Try again";
}

function showResult() {
  const reactionTime = Date.now() - startTime;
  state = "idle";

  gameArea.classList.remove("ready");
  gameArea.textContent = "Click to try again";

  message.textContent = "Your time: " + reactionTime + " ms";

  if (reactionTime < 200) {
    message.style.color = "green";
  } else if (reactionTime < 300) {
    message.style.color = "orange";
  } else {
    message.style.color = "red";
  }
}

function resetGame() {
  clearTimeout(timeout);
  state = "idle";
  gameArea.className = "game-area";
  gameArea.textContent = "Click to start";
  message.textContent = "";
}
</script>

</body>
</html>
