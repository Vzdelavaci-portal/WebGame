<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGame #13 – Mini Snake</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: #f1f5f9;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

.game-box {
  text-align: center;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

canvas {
  background: #0f172a;
  border-radius: 12px;
}

h1 {
  margin-top: 0;
}

.stats {
  margin: 10px 0;
  font-weight: bold;
}

.message {
  height: 24px;
  font-weight: bold;
  color: red;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  background: #0f172a;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="game-box">
  <h1>WebGame #13 – Mini Snake</h1>

  <div class="stats">Score: <span id="score">0</span></div>

  <canvas id="game" width="300" height="300"></canvas>

  <div id="message" class="message"></div>

  <button onclick="startGame()">Start / Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const messageEl = document.getElementById("message");

const grid = 15;
const size = canvas.width;

let snake;
let direction;
let food;
let score;
let gameLoop;

function startGame() {
  clearInterval(gameLoop);

  snake = [{ x: 7, y: 7 }];
  direction = { x: 1, y: 0 }; // 🔥 start doprava
  food = randomFood();
  score = 0;

  scoreEl.textContent = score;
  messageEl.textContent = "";

  draw();

  gameLoop = setInterval(update, 150);
}

function update() {
  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // collision with wall
  if (
    head.x < 0 || head.y < 0 ||
    head.x >= grid || head.y >= grid
  ) {
    return gameOver();
  }

  // 🔥 FIX: kontrola kolize se sebou (bez hlavy)
  for (let i = 1; i < snake.length; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) {
      return gameOver();
    }
  }

  snake.unshift(head);

  // eat food
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    food = randomFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = "#0f172a";
  ctx.fillRect(0, 0, size, size);

  // snake
  ctx.fillStyle = "#22c55e";
  snake.forEach(part => {
    ctx.fillRect(
      part.x * (size / grid),
      part.y * (size / grid),
      size / grid - 2,
      size / grid - 2
    );
  });

  // food
  ctx.fillStyle = "#ef4444";
  ctx.fillRect(
    food.x * (size / grid),
    food.y * (size / grid),
    size / grid - 2,
    size / grid - 2
  );
}

function randomFood() {
  return {
    x: Math.floor(Math.random() * grid),
    y: Math.floor(Math.random() * grid)
  };
}

function gameOver() {
  clearInterval(gameLoop);
  messageEl.textContent = "Game Over!";
}

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp" && direction.y === 0) {
    direction = { x: 0, y: -1 };
  }
  if (e.key === "ArrowDown" && direction.y === 0) {
    direction = { x: 0, y: 1 };
  }
  if (e.key === "ArrowLeft" && direction.x === 0) {
    direction = { x: -1, y: 0 };
  }
  if (e.key === "ArrowRight" && direction.x === 0) {
    direction = { x: 1, y: 0 };
  }
});

// 🔥 automatický start
startGame();
</script>

</body>
</html>
