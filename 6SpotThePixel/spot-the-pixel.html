<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGame #6 - Spot the Pixel</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f1f5f9;
  font-family: Arial, sans-serif;
}

.game-box {
  width: 100%;
  max-width: 520px;
  background: white;
  padding: 24px;
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

h1 {
  margin-top: 0;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
  font-weight: bold;
}

.grid {
  display: grid;
  gap: 6px;
  justify-content: center;
  margin: 20px 0;
}

.cell {
  width: 60px;
  height: 60px;
  border-radius: 6px;
  cursor: pointer;
}

.message {
  min-height: 24px;
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  background: #0f172a;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="game-box">
  <h1>WebGame #6 – Spot the Pixel</h1>

  <div class="stats">
    <div>Level: <span id="level">1</span></div>
    <div>Score: <span id="score">0</span></div>
  </div>

  <div id="grid" class="grid"></div>

  <div id="message" class="message"></div>

  <button onclick="startGame()">Start / Restart</button>
</div>

<script>
const gridEl = document.getElementById("grid");
const levelEl = document.getElementById("level");
const scoreEl = document.getElementById("score");
const messageEl = document.getElementById("message");

let level = 1;
let score = 0;
let correctIndex = 0;

function startGame() {
  level = 1;
  score = 0;
  messageEl.textContent = "";
  generateGrid();
}

function generateGrid() {
  gridEl.innerHTML = "";

  const size = Math.min(3 + level, 8); // max 8x8
  gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

  const total = size * size;
  correctIndex = Math.floor(Math.random() * total);

  // base color
  const baseHue = Math.floor(Math.random() * 360);
  const baseColor = `hsl(${baseHue}, 70%, 55%)`;

  // slightly different color
  const diff = Math.max(5, 30 - level * 2);
  const differentColor = `hsl(${baseHue}, 70%, ${55 + diff}%)`;

  for (let i = 0; i < total; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");

    cell.style.background =
      i === correctIndex ? differentColor : baseColor;

    cell.addEventListener("click", () => handleClick(i));

    gridEl.appendChild(cell);
  }

  levelEl.textContent = level;
  scoreEl.textContent = score;
}

function handleClick(index) {
  if (index === correctIndex) {
    score += 10;
    level++;
    messageEl.textContent = "Nice! 👀";
    messageEl.style.color = "green";
    generateGrid();
  } else {
    messageEl.textContent = "Game Over 😅";
    messageEl.style.color = "red";
  }

  scoreEl.textContent = score;
}

startGame();
</script>

</body>
</html>
