<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGame #8 – Math Challenge</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f1f5f9;
  font-family: Arial, sans-serif;
}

.game-box {
  width: 100%;
  max-width: 520px;
  background: white;
  padding: 24px;
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

h1 {
  margin-top: 0;
}

.problem {
  font-size: 40px;
  margin: 20px 0;
  font-weight: bold;
}

input {
  padding: 12px;
  font-size: 20px;
  width: 120px;
  text-align: center;
  border-radius: 8px;
  border: 2px solid #cbd5f5;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
  font-weight: bold;
}

.message {
  min-height: 24px;
  margin-top: 10px;
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  background: #0f172a;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="game-box">
  <h1>WebGame #8 – Math Challenge</h1>

  <div class="stats">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">10</span>s</div>
  </div>

  <div id="problem" class="problem">?</div>

  <input id="answer" type="number" placeholder="?" />

  <div id="message" class="message"></div>

  <button onclick="startGame()">Start / Restart</button>
</div>

<script>
const problemEl = document.getElementById("problem");
const answerInput = document.getElementById("answer");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const messageEl = document.getElementById("message");

let score = 0;
let time = 10;
let correctAnswer = 0;
let timer;
let gameRunning = false;

function generateProblem() {
  const a = Math.floor(Math.random() * 10);
  const b = Math.floor(Math.random() * 10);

  const operators = ["+", "-", "*"];
  const op = operators[Math.floor(Math.random() * operators.length)];

  if (op === "+") correctAnswer = a + b;
  if (op === "-") correctAnswer = a - b;
  if (op === "*") correctAnswer = a * b;

  problemEl.textContent = `${a} ${op} ${b}`;
}

function startGame() {
  clearInterval(timer);

  score = 0;
  time = 10;
  gameRunning = true;

  scoreEl.textContent = score;
  timeEl.textContent = time;
  messageEl.textContent = "";

  generateProblem();
  answerInput.value = "";
  answerInput.focus();

  timer = setInterval(() => {
    time--;
    timeEl.textContent = time;

    if (time <= 0) {
      endGame();
    }
  }, 1000);
}

answerInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    checkAnswer();
  }
});

function checkAnswer() {
  if (!gameRunning) return;

  const userAnswer = Number(answerInput.value);

  if (userAnswer === correctAnswer) {
    score++;
    scoreEl.textContent = score;
    messageEl.textContent = "Correct! ✅";
    messageEl.style.color = "green";
    generateProblem();
  } else {
    messageEl.textContent = "Wrong 😅";
    messageEl.style.color = "red";
  }

  answerInput.value = "";
}

function endGame() {
  gameRunning = false;
  clearInterval(timer);

  messageEl.textContent = "Game Over! Score: " + score;
  messageEl.style.color = "red";
}
</script>

</body>
</html>
